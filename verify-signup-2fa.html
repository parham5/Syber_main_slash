<!-- verify-signup-2fa.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up your authenticator</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      height: 550px;
      width: 550px;
      text-align: center;
    }

    .container img {
      height: 100px;
      width: 100px;
      margin-bottom: 30px;
    }

    .logo {
      width: 50px;
      height: 50px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 15px;
    }
    .warning {
      background-color: rgba(243, 156, 18, 0.1);
      border: 1px solid #f39c12;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 25px;
      font-size: 14px;
      color: #f39c12;
      text-align: left;
    }
    .warning strong { display: block; margin-bottom: 5px; }
    .qr-container {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      display: inline-block;
    }
    .qr-container img {
      width: 200px;
      height: 200px;
    }
    .manual-code {
      background: #16181c;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      margin: 15px 0;
      color: #71767b;
    }
    .form-group input {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #2f3336;
      background-color: #000000;
      color: #ffffff;
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      margin-bottom: 15px;
    }
    .form-group input:focus { border-color: #1d9bf0; }
    .verify-btn {
      background-color: #1d9bf0;
      color: #ffffff;
      border: none;
      padding: 14px 32px;
      border-radius: 9999px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
    }
    .verify-btn:hover { background-color: #1a8cd8; }
    .skip-btn {
      background: transparent;
      color: #71767b;
      border: 1px solid #2f3336;
      padding: 14px 32px;
      border-radius: 9999px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .skip-btn:hover { background: rgba(113, 118, 123, 0.1); }
    .error-message {
      background-color: rgba(244, 67, 54, 0.1);
      border: 1px solid #f44336;
      color: #f44336;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .error-message.show { display: block; }
    .username-display {
      background: #16181c;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .username-display strong { color: #1d9bf0; }
  </style>
  <link rel="stylesheet" href="./ui-refactor.css">
  <script src="./app-enhancements.js" defer></script>
</head>
<body>
  <div class="container">
    <img alt="Cyberslash Logo" src = "Gemini_Generated_Image_tkdpcstkdpcstkdp.png">
    <h1>Set up 2FA</h1>
    
    <div class="warning">
      <strong>⚠️ WARNING</strong>
      We use authenticator apps for password recovery. If you don't set up one and forget your password, you CANNOT recover your account!
    </div>
    
    <div class="username-display">
      Your username: <strong id="usernameDisplay"></strong>
    </div>
    
    <p style="color: #71767b; margin-bottom: 15px;">Scan this QR code with your authenticator app</p>
    
    <div class="qr-container">
      <img id="qrCode" src="" alt="QR Code">
    </div>
    
    <p style="color: #71767b; font-size: 14px;">Or enter this code manually:</p>
    <div class="manual-code" id="manualSecret"></div>
    
    <div id="errorMessage" class="error-message"></div>
    
    <div class="form-group">
      <input type="text" id="twoFactorCode" placeholder="000000" maxlength="6" autocomplete="one-time-code">
    </div>
    
    <button class="verify-btn" id="verifyBtn" onclick="verifyCode()">Verify & Complete</button>
    <button class="skip-btn" id="skipBtn" onclick="skipSetup()">Skip (Not Recommended)</button>
  </div>

  <script>
    let csrfToken = "";
    
    // Load stored data
    const username = sessionStorage.getItem("signupUsername");
    const tempSecret = sessionStorage.getItem("signupTempSecret");
    const signupToken = sessionStorage.getItem("signupToken");
    const qrCode = sessionStorage.getItem("signupQrCode");
    
    document.getElementById("usernameDisplay").textContent = username;
    document.getElementById("qrCode").src = qrCode;
    document.getElementById("manualSecret").textContent = tempSecret;
    
    fetch("/csrf-token", { credentials: "include" })
      .then(res => res.json())
      .then(data => csrfToken = data.csrfToken);

    function showError(msg) {
      const el = document.getElementById("errorMessage");
      el.textContent = msg;
      el.classList.add("show");
    }

    function verifyCode() {
      const code = document.getElementById("twoFactorCode").value;
      
      if (!code || code.length !== 6) {
        showError("Please enter a valid 6-digit code");
        return;
      }

      const btn = document.getElementById("verifyBtn");
      btn.disabled = true;
      btn.textContent = "Verifying...";

      fetch("/signup-verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-Token": csrfToken
        },
        credentials: "include",
        body: JSON.stringify({
          username,
          code,
          tempSecret,
          signupToken
        })
      })
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(() => {
        alert(`Signup successful! Your username is: ${username}\n\nSAVE THIS USERNAME to login next time!`);
        window.location.href = "/index.html";
      })
      .catch(() => {
        showError("Invalid authenticator code. Please try again.");
        btn.disabled = false;
        btn.textContent = "Verify & Complete";
      });
    }

    function skipSetup() {
      if (!confirm("Are you sure? If you forget your password, you CANNOT recover your account!")) {
        return;
      }

      const btn = document.getElementById("skipBtn");
      btn.disabled = true;
      btn.textContent = "Skipping...";

      fetch("/signup-skip-2fa", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-Token": csrfToken
        },
        credentials: "include",
        body: JSON.stringify({
          username,
          tempSecret,
          signupToken
        })
      })
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(() => {
        alert(`Signup successful! Your username is: ${username}\n\n⚠️ WARNING: You did not set up 2FA. If you forget your password, you CANNOT recover your account!`);
        window.location.href = "/index.html";
      })
      .catch(() => {
        alert("Signup failed. Please try again.");
        btn.disabled = false;
        btn.textContent = "Skip (Not Recommended)";
      });
    }

    document.getElementById("twoFactorCode").focus();
    document.addEventListener("keypress", e => { if (e.key === "Enter") verifyCode(); });
  </script>
</body>
</html>
