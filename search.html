  <style>
/* =========================================
   1. THEME SYSTEM & VARIABLES
   ========================================= */
:root {
  /* Default Theme (Dark/Amethyst Hybrid) */
  --theme-bg-primary: #050505;
  --theme-bg-secondary: rgba(20, 20, 20, 0.7);
  --theme-bg-tertiary: rgba(30, 30, 30, 0.5);
  --theme-border: rgba(255, 255, 255, 0.08);
  --theme-text-primary: #ffffff;
  --theme-text-secondary: #a1a1aa;
  --theme-accent: dodgerblue;
  --theme-accent-gradient: dodgerblue;
  --theme-glass: rgba(10, 10, 10, 0.65);
  --theme-glass-border: rgba(255, 255, 255, 0.1);
  --theme-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}
/* Default */
body.theme-default {
  --theme-bg-primary: #000000;
  --theme-bg-secondary: #111111;
  --theme-bg-tertiary: #1a1a1a;
  --theme-border: #333333;
  --theme-text-primary: #ffffff;
  --theme-text-secondary: #888888;
  --theme-accent: #1d9bf0;
  --theme-accent-gradient: linear-gradient(135deg, #1d9bf0 0%, #1d9bf0 100%);
}
/* Discord */
body.theme-discord {
  --theme-bg-primary: #36393f;
  --theme-bg-secondary: #2f3136;
  --theme-bg-tertiary: #202225;
  --theme-border: #202225;
  --theme-text-primary: #ffffff;
  --theme-text-secondary: #b9bbbe;
  --theme-accent: #5865f2;
  --theme-accent-gradient: linear-gradient(135deg, #5865f2 0%, #7289da 100%);
}
/* Amethyst */
body.theme-amethyst {
  --theme-bg-primary: #1a1a2e;
  --theme-bg-secondary: #16213e;
  --theme-bg-tertiary: #0f3460;
  --theme-border: #333;
  --theme-text-primary: #ffffff;
  --theme-text-secondary: #a0a0a0;
  --theme-accent: #667eea;
  --theme-accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
/* Aurora */
body.theme-aurora {
  --theme-bg-primary: #0a192f;
  --theme-bg-secondary: #112240;
  --theme-bg-tertiary: #233554;
  --theme-border: #233554;
  --theme-text-primary: #e6f1ff;
  --theme-text-secondary: #8892b0;
  --theme-accent: #00c6ff;
  --theme-accent-gradient: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
}
/* Sunset */
body.theme-sunset {
  --theme-bg-primary: #1a1a1a;
  --theme-bg-secondary: #2d2d2d;
  --theme-bg-tertiary: #3d3d3d;
  --theme-border: #444;
  --theme-text-primary: #ffffff;
  --theme-text-secondary: #aaa;
  --theme-accent: #f093fb;
  --theme-accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}
/* Forest */
body.theme-forest {
  --theme-bg-primary: #0d2018;
  --theme-bg-secondary: #142b1f;
  --theme-bg-tertiary: #1b3d2a;
  --theme-border: #1b3d2a;
  --theme-text-primary: #e8f5e9;
  --theme-text-secondary: #81c784;
  --theme-accent: #38ef7d;
  --theme-accent-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
}
/* Ocean */
body.theme-ocean {
  --theme-bg-primary: #0f1c3f;
  --theme-bg-secondary: #1a3a6e;
  --theme-bg-tertiary: #2a5298;
  --theme-border: #2a5298;
  --theme-text-primary: #e0efff;
  --theme-text-secondary: #8cb4e8;
  --theme-accent: #2a5298;
  --theme-accent-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
}
/* Midnight */
body.theme-midnight {
  --theme-bg-primary: #0f0c29;
  --theme-bg-secondary: #1a1a3a;
  --theme-bg-tertiary: #302b63;
  --theme-border: #302b63;
  --theme-text-primary: #e0e0e0;
  --theme-text-secondary: #9090a0;
  --theme-accent: #764ba2;
  --theme-accent-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
}
/* Fire */
body.theme-fire {
  --theme-bg-primary: #1a0a0a;
  --theme-bg-secondary: #2d1515;
  --theme-bg-tertiary: #4a1f1f;
  --theme-border: #4a1f1f;
  --theme-text-primary: #fff0f0;
  --theme-text-secondary: #d0a0a0;
  --theme-accent: #f5af19;
  --theme-accent-gradient: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
}
/* =========================================
   2. BASE STYLES & RESET
   ========================================= */
* {
  box-sizing: border-box;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background-color: var(--theme-bg-primary);
  color: var(--theme-text-primary);
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  transition: background-color 0.3s ease;
  /* Default gradient background for Amethyst/Default */
  background-image: radial-gradient(circle at 50% 0%, rgba(30, 143, 255, 0.404) 0%, #050505 60%);
}
/* Scrollbar Styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--theme-border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--theme-text-secondary); }
/* =========================================
   3. LAYOUT & SIDEBAR (Shared)
   ========================================= */
.main-container {
  display: flex;
  min-height: 100vh;
  width: 100%;
}
.sidebar {
  width: 220px; 
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid var(--theme-glass-border);
  display: flex;
  flex-direction: column;
  padding: 1.5rem;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
      background: rgba(255, 255, 255, 0);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
}
.sidebar-header {
  text-align: center;
}
    .brand-name {
    font-size: 1.5rem;
    color: #000000;
    text-shadow:
    0 0 5px #ffffff,
    0 0 10px #ffffff,
    0 0 20px #ffffff,
    0 0 40px #ffffff;
    font-weight: bold;
    text-align: center;
    margin: 0px;
    font-family: sans-serif;
    padding-bottom: 10px;
    }

.nav-links {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex: 1;
}

/* =========================================
   SIDEBAR ITEM STYLES (Matching Home Page)
   ========================================= */
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  color: var(--theme-text-secondary);
  text-decoration: none;
  border-radius: 12px;
  transition: all 0.2s ease;
  font-size: 0.95rem;
  font-weight: 500;
  position: relative;
  overflow: hidden;
}

.nav-item:hover {
  background-color: var(--theme-bg-tertiary);
  color: #ffffff !important; /* Force white text on hover */
  transform: translateX(4px);
}

.nav-item:hover svg {
  fill: #ffffff !important;
  stroke: #ffffff !important;
}

.nav-item.active {
  background: linear-gradient(90deg, var(--theme-accent) 0%, transparent 100%);
  color: #ffffff !important; /* Force white text */
  font-weight: 600;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #ffffff;
  box-shadow: 0 0 10px #ffffff;
}

/* Force Icons to White when Active or Hovering */
.nav-item.active svg,
.nav-item:hover svg {
  fill: #ffffff !important;
  stroke: #ffffff !important;
  filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
}

.nav-icon-small {
  width: 20px;
  height: 20px;
  fill: currentColor;
  flex-shrink: 0;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--theme-border);
}

.content-area {
  flex: 1;
  margin-left: 220px; /* Updated to match 240px sidebar */
  padding: 2rem 4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  position: relative;
}
/* =========================================
   4. CHAT MODULE (Directs Page)
   ========================================= */
.chat-wrapper {
  width: 100%;
  max-width: 1000px;
  height: 80vh;
  background: var(--theme-bg-secondary);
  border: 1px solid var(--theme-border);
  border-radius: 16px;
  display: flex;
  overflow: hidden;
}
/* Sidebar List */
.contact-list {
  width: 300px;
  border-right: 1px solid var(--theme-border);
  display: flex;
  flex-direction: column;
}
.list-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--theme-border);
}
.tab-btn {
  background: transparent;
  border: 1px solid var(--theme-border);
  color: var(--theme-text-secondary);
  padding: 0.5rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  margin-right: 0.5rem;
  transition: all 0.2s;
}
.tab-btn.active, .tab-btn:hover {
  background: var(--theme-accent);
  color: #fff;
  border-color: var(--theme-accent);
}
.contact-list-items {
  flex: 1;
  overflow-y: auto;
}
.contact-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 1rem 1.5rem;
  cursor: pointer;
  transition: background 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.contact-item:hover, .contact-item.active {
  background: var(--theme-bg-tertiary);
}
.contact-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}
.contact-info {
  flex: 1;
  min-width: 0;
}
.contact-name {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.contact-preview {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}
/* Chat View */
.chat-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}
.chat-header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--theme-border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--theme-bg-secondary);
}
.back-btn {
  background: transparent;
  border: none;
  color: var(--theme-text-primary);
  cursor: pointer;
  display: none; /* Hidden on desktop */
  padding: 4px;
}
.chat-area {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.message {
  max-width: 70%;
  padding: 0.8rem 1rem;
  border-radius: 12px;
  font-size: 0.95rem;
  line-height: 1.4;
  position: relative;
}
.message.sent {
  align-self: flex-end;
  background: var(--theme-accent);
  color: #fff;
  border-bottom-right-radius: 2px;
}
.message.received {
  align-self: flex-start;
  background: var(--theme-bg-tertiary);
  color: var(--theme-text-primary);
  border-bottom-left-radius: 2px;
}
.msg-time {
  display: block;
  font-size: 0.7rem;
  opacity: 0.7;
  margin-top: 4px;
  text-align: right;
}
.input-area {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--theme-border);
  display: flex;
  gap: 1rem;
  background: var(--theme-bg-secondary);
}
.msg-input {
  flex: 1;
  background: var(--theme-bg-tertiary);
  border: 1px solid var(--theme-border);
  border-radius: 20px;
  padding: 0.8rem 1.2rem;
  color: var(--theme-text-primary);
  font-family: inherit;
}
.msg-input:focus {
  border-color: var(--theme-accent);
}
.send-btn {
  background: var(--theme-accent);
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.send-btn:hover {
  transform: scale(1.05);
}
/* =========================================
   5. FEED & POST MODULE (Home Page)
   ========================================= */
.feed-wrapper {
  width: 100%;
  max-width: 800px;
}
.create-post-card {
  background: var(--theme-bg-secondary);
  border: 1px solid var(--theme-border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 2rem;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}
.create-input-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.create-input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--theme-text-primary);
  font-size: 1.1rem;
  resize: none;
  font-family: 'Inter', sans-serif;
  min-height: 60px;
  margin-bottom: 1rem;
}
.create-input::placeholder { color: var(--theme-text-secondary); }
.create-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--theme-border);
  padding-top: 1rem;
}
.upload-btn {
  background: transparent;
  border: 1px solid var(--theme-border);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--theme-text-secondary);
  transition: all 0.2s ease;
}
.upload-btn:hover {
  background: var(--theme-bg-tertiary);
  color: var(--theme-text-primary);
  border-color: var(--theme-text-secondary);
}
.upload-btn svg { width: 20px; height: 20px; fill: currentColor; }
.btn-send {
  background: var(--theme-accent-gradient);
  color: #fff;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
  padding: 0;
}
.btn-send:hover { opacity: 0.9; transform: scale(1.05); }
.btn-send svg { width: 18px; height: 18px; fill: #fff; }
/* Slash Card */
.slash-card {
  background: var(--theme-bg-secondary);
  border: 1px solid var(--theme-border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  transition: all 0.3s ease;
  position: relative;
}
.slash-card:hover {
  border-color: rgba(255, 255, 255, 0.15);
  background: rgba(255, 255, 255, 0.02);
}
.slash-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
}
.slash-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--theme-border);
}
.slash-meta { display: flex; flex-direction: column; }
.slash-author-link {
  text-decoration: none;
  color: var(--theme-text-primary);
  font-weight: 700;
  font-size: 1rem;
  transition: color 0.2s;
}
.slash-author-link:hover { color: var(--theme-accent); }
.slash-time {
  font-size: 0.85rem;
  color: var(--theme-text-secondary);
}
.slash-options {
  margin-left: auto;
  color: var(--theme-text-secondary);
  cursor: pointer;
  font-size: 1.2rem;
}
.slash-content {
  font-size: 1.05rem;
  line-height: 1.65;
  color: var(--theme-text-primary);
  margin-bottom: 1rem;
  white-space: pre-wrap;
}
.slash-tag {
  color: var(--theme-accent);
  cursor: pointer;
  font-weight: 500;
}
.slash-tag:hover { text-decoration: underline; }
.slash-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 0.8rem;
  border-top: 1px solid var(--theme-border);
}
.slash-stats {
  display: flex;
  gap: 1.5rem;
  font-size: 0.85rem;
  color: var(--theme-text-secondary);
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.stat-item:hover { color: var(--theme-text-primary); }
.stat-item svg { width: 16px; height: 16px; fill: currentColor; }
.slash-actions { display: flex; gap: 0.2rem; }
.action-btn {
  background: transparent;
  border: none;
  color: var(--theme-text-secondary);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.action-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;}
.action-btn:hover { background: var(--theme-bg-tertiary); color: var(--theme-text-primary); }
/* Specific Colors */
.action-btn.liked { color: #ef4444; }
.action-btn.liked svg { fill: #ef4444; stroke: none; }
.action-btn.saved { color: #ffffff; }
.action-btn.saved svg { fill: #ffffff; stroke: none; }
.action-btn.re-slashed { color: #10b981; }
.action-btn.re-slashed svg { fill: #10b981; stroke: none; }
/* =========================================
6. SEARCH & RESULTS MODULE
========================================= */
.search-wrapper {
  width: 100%;
  max-width: 900px;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.search-container {
  position: relative;
  margin-bottom: 2rem;
}
.search-input {
  width: 100%;
  background: var(--theme-bg-secondary);
  border: 1px solid var(--theme-border);
  border-radius: 16px;
  padding: 1.2rem 1.5rem 1.2rem 3.5rem;
  font-size: 1.1rem;
  color: var(--theme-text-primary);
  font-family: 'Inter', sans-serif;
  transition: all 0.3s ease;
  box-shadow: var(--theme-shadow);
}
.search-input:focus {
  border-color: var(--theme-accent);
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
}
.search-icon {
  position: absolute;
  left: 1.2rem;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  fill: var(--theme-text-secondary);
  transition: fill 0.3s;
}
.search-input:focus + .search-icon {
  fill: var(--theme-accent);
}
.autocomplete-panel {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  display: none;
  z-index: 20;
  overflow: hidden;
  border: 1px solid var(--theme-border);
  border-radius: 14px;
  background: color-mix(in srgb, var(--theme-bg-secondary) 94%, #000 6%);
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
}
.autocomplete-panel.show {
  display: block;
}
.suggestion-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border: 0;
  border-bottom: 1px solid var(--theme-border);
  background: transparent;
  color: var(--theme-text-primary);
  cursor: pointer;
  text-align: left;
}
.suggestion-item:last-child {
  border-bottom: 0;
}
.suggestion-item:hover {
  background: var(--theme-bg-tertiary);
}
.suggestion-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
}
.filter-tabs {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--theme-border);
  padding-bottom: 1rem;
}
.tab-btn {
  background: transparent;
  border: none;
  color: var(--theme-text-secondary);
  font-size: 0.95rem;
  font-weight: 600;
  padding: 0.5rem 1rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab-btn:hover {
  color: var(--theme-text-primary);
  background: var(--theme-bg-tertiary);
}
.tab-btn.active {
  color: var(--theme-text-primary);
  background: var(--theme-bg-tertiary);
  border: 1px solid var(--theme-border);
}
.tab-btn svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}
.search-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  margin: -0.25rem 0 1rem;
}
.search-select {
  min-height: 38px;
  border: 1px solid var(--theme-border);
  border-radius: 10px;
  background: var(--theme-bg-secondary);
  color: var(--theme-text-primary);
  padding: 0 12px;
}
.explore-strip {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 1.2rem;
}
.trend-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 0 8px;
  scrollbar-width: thin;
}
.trend-chip {
  border: 1px solid var(--theme-border);
  background: var(--theme-bg-secondary);
  color: var(--theme-text-primary);
  border-radius: 999px;
  padding: 8px 12px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 0.84rem;
  font-weight: 700;
  transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
}
.trend-chip:hover,
.trend-chip.active {
  border-color: var(--theme-accent);
  background: var(--theme-bg-tertiary);
  transform: translateY(-1px);
}
.result-summary {
  color: var(--theme-text-secondary);
  font-size: 0.86rem;
  white-space: nowrap;
}
.search-loading {
  display: none;
  color: var(--theme-text-secondary);
  margin: 0 0 1rem;
  font-size: 0.9rem;
}
.search-loading.show {
  display: block;
}
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
  width: 100%;
}
.result-card {
  background: var(--theme-bg-secondary);
  border: 1px solid var(--theme-border);
  border-radius: 16px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.result-card.clickable-card {
  cursor: pointer;
}
.result-card:hover {
  transform: translateY(-5px);
  border-color: var(--theme-accent);
  background: rgba(255, 255, 255, 0.03);
}
.hashtag-card {
  gap: 10px;
}
.hashtag-name {
  color: var(--theme-text-primary);
  font-size: 1.35rem;
  font-weight: 900;
}
.hashtag-meta {
  color: var(--theme-text-secondary);
  font-size: 0.9rem;
}
/* User Card Specifics */
.user-card {
  align-items: center;
  text-align: center;
}
.user-avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: var(--theme-bg-tertiary);
  margin-bottom: 1rem;
  border: 2px solid var(--theme-border);
  object-fit: cover;
}
.user-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--theme-text-primary);
  margin-bottom: 0.2rem;
  overflow-wrap: anywhere;
}
.user-handle {
  font-size: 0.85rem;
  color: var(--theme-text-secondary);
  margin-bottom: 1rem;
}
.user-stats {
  display: flex;
  gap: 1rem;
  font-size: 0.8rem;
  color: var(--theme-text-secondary);
  margin-bottom: 1.2rem;
}
/* Post Card Specifics */
.post-card {
  justify-content: space-between;
}
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}
.post-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--theme-bg-tertiary);
  object-fit: cover;
}
.post-author {
  font-size: 0.9rem;
  font-weight: 600;
}
.post-time {
  font-size: 0.75rem;
  color: var(--theme-text-secondary);
}
.post-content {
  font-size: 0.95rem;
  color: var(--theme-text-primary);
  line-height: 1.5;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.post-media-preview {
  width: 100%;
  aspect-ratio: 16 / 10;
  border-radius: 10px;
  object-fit: cover;
  border: 1px solid var(--theme-border);
  background: var(--theme-bg-tertiary);
  margin-bottom: 1rem;
}
.result-highlight {
  color: var(--theme-text-primary);
  background: color-mix(in srgb, var(--theme-accent) 28%, transparent);
  border-radius: 4px;
  padding: 0 2px;
}
.post-footer {
  display: flex;
  gap: 1rem;
  margin-top: auto;
  border-top: 1px solid var(--theme-border);
  padding-top: 1rem;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.8rem;
  color: var(--theme-text-secondary);
}
.stat-item svg {
  width: 14px;
  height: 14px;
  fill: currentColor;
}
.btn {
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary {
  background: var(--theme-accent-gradient);
  color: #fff;
  border: none;
  width: 100%;
}
.btn-primary:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}
.empty-state {
  text-align: center;
  color: var(--theme-text-secondary);
  padding: 3rem 0;
  display: none;
}
.empty-state svg {
  width: 64px;
  height: 64px;
  fill: var(--theme-border);
  margin-bottom: 1rem;
}
/* =========================================
7. MOBILE NAVBAR
========================================= */
.mobile-navbar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--theme-glass);
  backdrop-filter: blur(15px);
  border-top: 1px solid var(--theme-glass-border);
  padding: 10px 10px 20px 10px;
  z-index: 1000;
}
.nav-items {
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.nav-items a {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--theme-text-secondary);
  text-decoration: none;
  font-size: 0.7rem;
  padding: 8px;
  border-radius: 12px;
  transition: color 0.2s;
  min-width: 50px;
}
.nav-items a.active { color: var(--theme-accent); }
.nav-items a svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
  margin-bottom: 4px;
}
/* =========================================
8. RESPONSIVE
========================================= */
@media (max-width: 1320px) {
  .sidebar {
    display: none !important;
  }
  .content-area {
    margin-left: 0 !important;
    width: 100%;
    padding: 2rem 2rem;
  }
}

@media (max-width: 900px) {
  .sidebar { display: none; }
  .mobile-navbar { display: block; }
  .content-area {
    margin-left: 0;
    padding: 2rem 1rem 100px 1rem;
  }
  /* Chat Mobile Adjustments */
  .chat-wrapper {
    height: 100%;
    border-radius: 0;
    border: none;
  }
  .contact-list {
    width: 100%;
    display: flex;
  }
  .chat-view {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--theme-bg-primary);
    z-index: 10;
  }
  .chat-wrapper.show-chat .contact-list {
    display: none;
  }
  .chat-wrapper.show-chat .chat-view {
    display: flex;
  }
  .back-btn {
    display: block;
  }
  .results-grid { grid-template-columns: 1fr; }
  .filter-tabs { overflow-x: auto; padding-bottom: 0.5rem; }
  .explore-strip {
    grid-template-columns: 1fr;
  }
  .result-summary {
    white-space: normal;
  }
}

<script type="application/json" id="legacySearchScript">
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const resultsGrid = document.getElementById('resultsGrid');
    const emptyState = document.getElementById('emptyState');
    const tabBtns = document.querySelectorAll('.tab-btn');
    let currentFilter = 'all';
    let searchTimeout = null;

    // Tab Switching Logic
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter || 'all';
        // Re-run search if there is a query
        if (searchInput.value.trim()) {
          performSearch(searchInput.value.trim());
        } else if (currentFilter === 'users') {
           // If switching to Users tab with no search, show top users again
           performSearch(""); 
        }
      });
    });

    // Search Input Logic
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (searchTimeout) clearTimeout(searchTimeout);
      if (query.length === 0) {
        // Debounce clear, wait a bit before clearing or showing defaults
        searchTimeout = setTimeout(() => {
           performSearch(""); // Trigger default view
        }, 300);
        return;
      }
      searchTimeout = setTimeout(() => {
        performSearch(query);
      }, 300);
    });

    // Handle Enter key
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        if (searchTimeout) clearTimeout(searchTimeout);
        performSearch(searchInput.value.trim());
      }
    });

    async function performSearch(query) {
      try {
        // If query is empty, we still send it to API to get default top users
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login.html';
            return;
          }
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        renderResults(data.users, data.posts);
      } catch (error) {
        console.error("Search error:", error);
        resultsGrid.innerHTML = '';
        emptyState.style.display = 'block';
        emptyState.innerHTML = '<p class="text-red-500">Failed to load results. Please try again.</p>';
      }
    }

    function renderResults(users, posts) {
      resultsGrid.innerHTML = '';
      let hasResults = false;

      // Filter based on active tab
      const filteredUsers = currentFilter === 'users' ? users : (currentFilter === 'all' ? users : []);
      const filteredPosts = currentFilter === 'slashes' ? posts : (currentFilter === 'all' ? posts : []);

      // Render Users
      if (filteredUsers.length > 0) {
        hasResults = true;
        filteredUsers.forEach(user => {
          const card = document.createElement('div');
          card.className = 'result-card user-card';
          const pfpSrc = user.pfp ? user.pfp : './favicon.ico';
          
          card.innerHTML = `
            <img src="${pfpSrc}" alt="User" class="user-avatar">
            <div class="user-info">
              <div class="user-name">${user.username}</div>
              <div class="user-handle">/${user.username.replace('/', '')}</div>
              <div class="user-stats">
                <span>${user.followers} Followers</span>
                <span>•</span>
                <span>${user.postCount} Posts</span>
              </div>
            </div>
            <a href="/pf.html?user=${encodeURIComponent(user.username)}" class="btn btn-primary">View Profile</a>
          `;
          resultsGrid.appendChild(card);
        });
      }

      // Render Posts
      if (filteredPosts.length > 0) {
        hasResults = true;
        filteredPosts.forEach(post => {
          const card = document.createElement('div');
          card.className = 'result-card post-card';
          const date = new Date(post.timestamp);
          const timeString = date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
          const pfpSrc = post.pfp ? post.pfp : './favicon.ico';

          card.innerHTML = `
            <div class="post-header">
              <img src="${pfpSrc}" alt="User" class="post-avatar">
              <div>
                <div class="post-author">${post.username}</div>
                <div class="post-time">${timeString}</div>
              </div>
            </div>
            <div class="post-content">${post.message}</div>
            <div class="post-footer">
              <div class="stat-item">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 11.01L3 11v2h18.01v-2zM21 7.01L3 7v2h18.01v-2zM21 15.01L3 15v2h18.01v-2z"></path></svg>
                ${post.retweets}
              </div>
              <div class="stat-item">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
                ${post.likes}
              </div>
            </div>
          `;
          resultsGrid.appendChild(card);
        });
      }

      // Show/Hide Empty State
      if (hasResults) {
        emptyState.style.display = 'none';
        emptyState.innerHTML = ''; 
      } else {
        emptyState.style.display = 'block';
        emptyState.innerHTML = '<p>No results found for "' + searchInput.value + '"</p>';
      }
    }

    // Initial Load: Trigger search with empty string to show top users
    performSearch("");
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const resultsGrid = document.getElementById('resultsGrid');
    const emptyState = document.getElementById('emptyState');
    const trendChips = document.getElementById('trendChips');
    const resultSummary = document.getElementById('resultSummary');
    const searchLoading = document.getElementById('searchLoading');
    const autocompletePanel = document.getElementById('autocompletePanel');
    const sortSelect = document.getElementById('sortSelect');
    const tabBtns = document.querySelectorAll('.tab-btn');
    let currentFilter = 'all';
    let searchTimeout = null;
    let suggestTimeout = null;
    let latestSearchId = 0;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightText(value, query) {
      const safeValue = escapeHtml(value);
      const cleanQuery = String(query || '').replace(/^#/, '').trim();
      if (!cleanQuery) return safeValue;
      return safeValue.replace(new RegExp(`(${escapeRegExp(cleanQuery)})`, 'ig'), '<span class="result-highlight">$1</span>');
    }

    function setLoading(isLoading) {
      if (searchLoading) searchLoading.classList.toggle('show', isLoading);
    }

    function updateUrlQuery(query) {
      const url = new URL(window.location.href);
      if (query) url.searchParams.set('q', query);
      else url.searchParams.delete('q');
      window.history.replaceState({}, '', url.toString());
    }

    function setSummary(users, posts, query) {
      const hashtags = arguments[3] || [];
      const total = (users?.length || 0) + (posts?.length || 0) + (hashtags?.length || 0);
      if (!resultSummary) return;
      if (!query) {
        resultSummary.textContent = total ? `${total} explore picks` : 'Fresh explore picks';
        return;
      }
      resultSummary.textContent = `${total} result${total === 1 ? '' : 's'} for "${query}"`;
    }

    function hideAutocomplete() {
      if (autocompletePanel) {
        autocompletePanel.classList.remove('show');
        autocompletePanel.innerHTML = '';
      }
    }

    async function loadAutocomplete(query) {
      if (!autocompletePanel || query.length < 2) {
        hideAutocomplete();
        return;
      }
      try {
        const response = await fetch(`/api/search/suggest?q=${encodeURIComponent(query)}`, { credentials: 'include' });
        if (!response.ok) return hideAutocomplete();
        const data = await response.json();
        renderAutocomplete(data, query);
      } catch (_) {
        hideAutocomplete();
      }
    }

    function renderAutocomplete(data, query) {
      const items = [];
      (data.users || []).slice(0, 3).forEach(user => {
        items.push(`<button class="suggestion-item" data-value="${escapeHtml(user.username)}" type="button">
          <img class="suggestion-avatar" src="${escapeHtml(user.pfp || './favicon.ico')}" onerror="this.src='./favicon.ico'" alt="">
          <span>${highlightText(user.username, query)}</span>
        </button>`);
      });
      (data.hashtags || []).slice(0, 4).forEach(item => {
        items.push(`<button class="suggestion-item" data-value="${escapeHtml(item.tag)}" type="button">
          <span class="hashtag-name" style="font-size:1rem">${escapeHtml(item.tag)}</span>
          <span class="hashtag-meta">${Number(item.count || 0)} posts</span>
        </button>`);
      });
      (data.posts || []).slice(0, 3).forEach(post => {
        const preview = String(post.message || '').slice(0, 80);
        items.push(`<button class="suggestion-item" data-value="${escapeHtml(preview)}" type="button">
          <span>${highlightText(preview || post.username, query)}</span>
        </button>`);
      });
      autocompletePanel.innerHTML = items.join('');
      autocompletePanel.classList.toggle('show', items.length > 0);
      autocompletePanel.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => {
          const value = item.dataset.value || '';
          searchInput.value = value;
          hideAutocomplete();
          performSearch(value);
        });
      });
    }

    async function loadTrendingTopics() {
      if (!trendChips) return;
      try {
        const response = await fetch('/api/feed/trending', { credentials: 'include' });
        const data = await response.json();
        const topics = Array.isArray(data.topics) ? data.topics.slice(0, 8) : [];
        trendChips.innerHTML = '';
        topics.forEach(topic => {
          const word = String(topic.word || '').trim();
          if (!word) return;
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'trend-chip';
          chip.textContent = word.startsWith('#') ? word : `#${word}`;
          chip.addEventListener('click', () => {
            const query = chip.textContent;
            searchInput.value = query;
            currentFilter = 'all';
            tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === 'all'));
            performSearch(query);
          });
          trendChips.appendChild(chip);
        });
      } catch (error) {
        trendChips.innerHTML = '';
      }
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter || 'all';
        performSearch(searchInput.value.trim());
      });
    });

    searchInput.addEventListener('input', (event) => {
      const query = event.target.value.trim();
      if (searchTimeout) clearTimeout(searchTimeout);
      if (suggestTimeout) clearTimeout(suggestTimeout);
      suggestTimeout = setTimeout(() => loadAutocomplete(query), 140);
      searchTimeout = setTimeout(() => performSearch(query), query ? 250 : 150);
    });

    searchInput.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') {
        if (searchTimeout) clearTimeout(searchTimeout);
        performSearch(searchInput.value.trim());
        hideAutocomplete();
      }
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(hideAutocomplete, 180);
    });

    if (sortSelect) {
      sortSelect.addEventListener('change', () => performSearch(searchInput.value.trim()));
    }

    async function performSearch(query) {
      const searchId = ++latestSearchId;
      setLoading(true);
      updateUrlQuery(query);
      try {
        const params = new URLSearchParams({
          q: query,
          type: currentFilter,
          sort: sortSelect?.value || 'top',
          limit: '60'
        });
        const response = await fetch(`/api/search?${params.toString()}`, { credentials: 'include' });
        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login.html';
            return;
          }
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        if (searchId !== latestSearchId) return;
        renderResults(data.users || [], data.posts || [], data.hashtags || [], query);
      } catch (error) {
        console.error('Search error:', error);
        resultsGrid.innerHTML = '';
        emptyState.style.display = 'block';
        emptyState.innerHTML = '<p>Failed to load results. Please try again.</p>';
      } finally {
        if (searchId === latestSearchId) setLoading(false);
      }
    }

    function renderResults(users, posts, hashtags, query) {
      resultsGrid.innerHTML = '';
      let hasResults = false;
      const filteredUsers = currentFilter === 'users' ? users : (currentFilter === 'all' ? users : []);
      const filteredPosts = currentFilter === 'slashes' ? posts : (currentFilter === 'all' ? posts : []);
      const filteredHashtags = currentFilter === 'hashtags' ? hashtags : (currentFilter === 'all' ? hashtags : []);

      filteredHashtags.forEach(item => {
        hasResults = true;
        const card = document.createElement('div');
        card.className = 'result-card hashtag-card clickable-card';
        card.innerHTML = `
          <div class="hashtag-name">${escapeHtml(item.tag || '#topic')}</div>
          <div class="hashtag-meta">${Number(item.count || 0)} related slash${Number(item.count || 0) === 1 ? '' : 'es'}</div>
          <div class="hashtag-meta">Score ${Number(item.score || 0)}</div>
        `;
        card.addEventListener('click', () => {
          searchInput.value = item.tag || '';
          currentFilter = 'all';
          tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === 'all'));
          performSearch(searchInput.value.trim());
        });
        resultsGrid.appendChild(card);
      });

      filteredUsers.forEach(user => {
        hasResults = true;
        const card = document.createElement('div');
        card.className = 'result-card user-card clickable-card';
        const pfpSrc = user.pfp ? user.pfp : './favicon.ico';
        card.innerHTML = `
          <img src="${escapeHtml(pfpSrc)}" alt="User" class="user-avatar" onerror="this.src='./favicon.ico'">
          <div class="user-info">
            <div class="user-name">${highlightText(user.username, query)} ${user.isPremium ? '<span class="premium-badge">/P</span>' : ''}</div>
            <div class="user-handle">/${escapeHtml(String(user.username || '').replace('/', ''))}</div>
            <div class="user-handle">${highlightText(user.about || 'No bio yet.', query)}</div>
            <div class="user-stats">
              <span>${Number(user.followers || 0)} Followers</span>
              <span>-</span>
              <span>${Number(user.postCount || 0)} Posts</span>
            </div>
          </div>
          <a href="/pf.html?user=${encodeURIComponent(user.username)}" class="btn btn-primary">View Profile</a>
        `;
        card.addEventListener('click', (event) => {
          if (event.target.closest('a, button')) return;
          window.location.href = `/pf.html?user=${encodeURIComponent(user.username)}`;
        });
        resultsGrid.appendChild(card);
      });

      filteredPosts.forEach(post => {
        hasResults = true;
        const card = document.createElement('div');
        card.className = 'result-card post-card clickable-card';
        const date = new Date(post.timestamp);
        const timeString = date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        const pfpSrc = post.pfp ? post.pfp : './favicon.ico';
        const mediaHtml = post.imageUrl
          ? (post.isVideo
            ? `<video class="post-media-preview" src="${escapeHtml(post.imageUrl)}" muted playsinline preload="metadata"></video>`
            : `<img class="post-media-preview" src="${escapeHtml(post.imageUrl)}" alt="Post media" onerror="this.remove()">`)
          : '';

        card.innerHTML = `
          <div class="post-header">
            <img src="${escapeHtml(pfpSrc)}" alt="User" class="post-avatar" onerror="this.src='./favicon.ico'">
            <div>
              <div class="post-author">${highlightText(post.username, query)} ${post.isPremium ? '<span class="premium-badge">/P</span>' : ''}</div>
              <div class="post-time">${timeString}</div>
            </div>
          </div>
          ${mediaHtml}
          <div class="post-content">${highlightText(post.message, query)}</div>
          <div class="post-footer">
            <div class="stat-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 11.01L3 11v2h18.01v-2zM21 7.01L3 7v2h18.01v-2zM21 15.01L3 15v2h18.01v-2z"></path></svg>
              ${Number(post.retweets || 0)}
            </div>
            <div class="stat-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
              ${Number(post.likes || 0)}
            </div>
            <div class="stat-item">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 6h-2v9H7v2c0 .55.45 1 1 1h10l4 4V7c0-.55-.45-1-1-1zM17 12V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"></path></svg>
              ${Number(post.replyCount || 0)}
            </div>
          </div>
        `;
        card.addEventListener('click', () => {
          if (post.id) window.location.href = `/post.html?id=${encodeURIComponent(post.id)}`;
        });
        resultsGrid.appendChild(card);
      });

      setSummary(filteredUsers, filteredPosts, query, filteredHashtags);

      if (hasResults) {
        emptyState.style.display = 'none';
        emptyState.innerHTML = '';
      } else {
        emptyState.style.display = 'block';
        emptyState.innerHTML = `<p>No results found for "${escapeHtml(searchInput.value)}"</p>`;
      }
    }

    const initialQuery = new URLSearchParams(window.location.search).get('q') || '';
    searchInput.value = initialQuery;
    loadTrendingTopics();
    performSearch(initialQuery);
  });
</script>
</body>
</html>
