name: CD-Liara
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: update-liara
        env:
          LIARA_TOKEN: ${{ secrets.LIARA_API_TOKEN }} # api secret = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySUQiOiI2OThjNWRkZjc2NDc1MDk3NTM2YTJmNDEiLCJ0eXBlIjoiYXV0aCIsImlhdCI6MTc3NDU5MzI0OSwiZXhwIjoxODA2MTUwODQ5fQ.E6sM2vzklWC7DFpOTBX5yncczSnqw0eEo1qvoALqUtE
        run: |
          npm i -g @liara/cli@9
          liara deploy --app="cyberslash" --api-token="$LIARA_TOKEN" --no-app-logs --port=3000